  <text x="90" y="475" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#e2e8f0">
    <tspan x="90" y="475">Package files are only part of the job. Real repositories also need indexes,</tspan>
    <tspan x="90" y="507">signatures, storage, and serving.</tspan>
  </text>
